services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager_test

  backend:
    image: prasadpingale24/task-manager-backend:latest
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager_test
      SECRET_KEY: test-secret
    command: >
      pytest tests/
      --junitxml=results.xml
      --cov=app
      --cov-report=xml
      -v