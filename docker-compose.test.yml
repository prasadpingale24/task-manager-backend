services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-task_manager_test}
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-task_manager_test}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      args:
        - INSTALL_DEV=true
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-task_manager_test}
      SECRET_KEY: test-secret
      PYTHONPATH: /app
    command: >
      sh -c "pytest tests/ --junitxml=results.xml --cov=app --cov-report=xml -v"