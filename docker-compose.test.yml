services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager_test

  backend:
    build: .
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager_test
      SECRET_KEY: test-secret
      PYTHONPATH: /app
    command: >
      sh -c "pytest tests/
             --junitxml=results.xml
             --cov=app
             --cov-report=xml
             -v"